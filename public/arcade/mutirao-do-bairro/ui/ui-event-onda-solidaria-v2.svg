<svg width="320" height="100" viewBox="0 0 320 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ondaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7FD36E" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#C9F27B" stop-opacity="0.85"/>
    </linearGradient>
  </defs>
  
  <!-- Banner de evento -->
  <rect x="10" y="10" width="300" height="80" rx="16" fill="url(#ondaGrad)"/>
  <rect x="12" y="12" width="296" height="76" rx="14" fill="none" stroke="#7FD36E" stroke-width="2.5"/>
  
  <!-- Maos conectadas -->
  <g transform="translate(70, 50)">
    <path d="M -20 0 L -10 -10 L 0 -5 L 0 10" fill="#2F5D50"/>
    <path d="M 20 0 L 10 -10 L 0 -5 L 0 10" fill="#2F5D50"/>
    <circle cx="-10" cy="-10" r="6" fill="#C9F27B"/>
    <circle cx="10" cy="-10" r="6" fill="#C9F27B"/>
    <circle cx="0" cy="0" r="8" fill="#F9CF4A"/>
  </g>
  
  <!-- Fluxo positivo -->
  <path d="M 100 35 Q 120 30 140 35" stroke="#C9F27B" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M 100 50 Q 120 45 140 50" stroke="#C9F27B" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M 100 65 Q 120 60 140 65" stroke="#C9F27B" stroke-width="4" stroke-linecap="round" fill="none"/>
  
  <!-- Texto do evento -->
  <text x="220" y="48" font-family="sans-serif" font-size="18" font-weight="bold" 
        fill="#123D59" text-anchor="middle">ONDA SOLIDARIA</text>
  <text x="220" y="70" font-family="sans-serif" font-size="12" 
        fill="#2F5D50" text-anchor="middle">Apoio coletivo fortaleceu</text>
</svg>
