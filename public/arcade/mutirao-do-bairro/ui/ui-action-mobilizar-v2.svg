<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="networkGlow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#C9F27B" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#C9F27B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Glow de fundo -->
  <circle cx="32" cy="32" r="30" fill="url(#networkGlow)"/>
  
  <!-- Rede de nos interconectados (montagem coletiva) -->
  <!-- Nos principais -->
  <circle cx="32" cy="16" r="5" fill="#7FD36E"/>
  <circle cx="16" cy="30" r="5" fill="#7FD36E"/>
  <circle cx="48" cy="30" r="5" fill="#7FD36E"/>
  <circle cx="24" cy="48" r="5" fill="#7FD36E"/>
  <circle cx="40" cy="48" r="5" fill="#7FD36E"/>
  <circle cx="32" cy="32" r="6" fill="#C9F27B"/>
  
  <!-- Conexoes reticulares -->
  <line x1="32" y1="16" x2="16" y2="30" stroke="#C9F27B" stroke-width="2.5" opacity="0.8"/>
  <line x1="32" y1="16" x2="48" y2="30" stroke="#C9F27B" stroke-width="2.5" opacity="0.8"/>
  <line x1="16" y1="30" x2="24" y2="48" stroke="#C9F27B" stroke-width="2.5" opacity="0.8"/>
  <line x1="48" y1="30" x2="40" y2="48" stroke="#C9F27B" stroke-width="2.5" opacity="0.8"/>
  <line x1="32" y1="16" x2="32" y2="32" stroke="#C9F27B" stroke-width="2.5" opacity="0.8"/>
  <line x1="16" y1="30" x2="32" y2="32" stroke="#C9F27B" stroke-width="2.5" opacity="0.8"/>
  <line x1="48" y1="30" x2="32" y2="32" stroke="#C9F27B" stroke-width="2.5" opacity="0.8"/>
  <line x1="24" y1="48" x2="32" y2="32" stroke="#C9F27B" stroke-width="2.5" opacity="0.8"/>
  <line x1="40" y1="48" x2="32" y2="32" stroke="#C9F27B" stroke-width="2.5" opacity="0.8"/>
  <line x1="24" y1="48" x2="40" y2="48" stroke="#C9F27B" stroke-width="2.5" opacity="0.8"/>
  
  <!-- Nos internos -->
  <circle cx="32" cy="16" r="2" fill="#123D59"/>
  <circle cx="16" cy="30" r="2" fill="#123D59"/>
  <circle cx="48" cy="30" r="2" fill="#123D59"/>
