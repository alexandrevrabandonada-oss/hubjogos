<svg width="280" height="48" viewBox="0 0 280 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pressureStable" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7FD36E"/>
      <stop offset="40%" stop-color="#7FD36E"/>
      <stop offset="100%" stop-color="#C9F27B"/>
    </linearGradient>
    <linearGradient id="pressureTension" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F9CF4A"/>
      <stop offset="100%" stop-color="#F18F4E"/>
    </linearGradient>
    <linearGradient id="pressureAlert" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F18F4E"/>
      <stop offset="100%" stop-color="#D74B4B"/>
    </linearGradient>
  </defs>
  
  <!-- Container -->
  <rect x="2" y="2" width="276" height="44" rx="22" fill="#0F1E2B" opacity="0.8"/>
  <rect x="4" y="4" width="272" height="40" rx="20" fill="none" stroke="#123D59" stroke-width="3"/>
  
  <!-- Marcadores de threshold -->
  <line x1="118" y1="8" x2="118" y2="40" stroke="#123D59" stroke-width="1.5" opacity="0.5"/>
  <line x1="182" y1="8" x2="182" y2="40" stroke="#123D59" stroke-width="1.5" opacity="0.5"/>
  <line x1="230" y1="8" x2="230" y2="40" stroke="#123D59" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Labels de threshold (55%, 70%, 85%) -->
  <text x="118" y="18" font-family="sans-serif" font-size="8" fill="#7FD36E" text-anchor="middle">55</text>
  <text x="182" y="18" font-family="sans-serif" font-size="8" fill="#F9CF4A" text-anchor="middle">70</text>
  <text x="230" y="18" font-family="sans-serif" font-size="8" fill="#F18F4E" text-anchor="middle">85</text>
  
  <!-- Barra de preenchimento (exemplo em 42% - zona estavel) -->
  <rect x="10" y="10" width="106" height="28" rx="14" fill="url(#pressureStable)"/>
  
  <!-- Label principal -->
  <text x="140" y="32" font-family="sans-serif" font-size="12" font-weight="600" 
        fill="#C9F27B" text-anchor="middle">PRESSAO</text>
  
  <!-- Icone de warning (aparece quando > 85%) - aqui invisivel -->
  <g opacity="0">
    <polygon points="260,16 272,36 248,36" fill="#D74B4B"/>
    <text x="260" y="32" font-family="sans-serif" font-size="14" font-weight="bold" 
          fill="#0F1E2B" text-anchor="middle">!</text>
  </g>
</svg>
