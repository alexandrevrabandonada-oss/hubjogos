<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="mutiraoGlow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#F9CF4A" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#C9F27B" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#C9F27B" stop-opacity="0"/>
    </radialGradient>
    <filter id="pulseGlow">
      <feGaussianBlur stdDeviation="3"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="1.2"/>
      </feComponentTransfer>
    </filter>
  </defs>
  
  <!-- Halo pulsante -->
  <circle cx="32" cy="32" r="30" fill="url(#mutiraoGlow)" filter="url(#pulseGlow)"/>
  
  <!-- Estrela cooperativa (pico de forca coletiva) -->
  <path d="M 32 8 L 36 24 L 52 24 L 40 34 L 44 50 L 32 40 L 20 50 L 24 34 L 12 24 L 28 24 Z" 
        fill="#F9CF4A" stroke="#C9F27B" stroke-width="2"/>
  
  <!-- Circuito coletivo interno -->
  <circle cx="32" cy="32" r="14" fill="#C9F27B" opacity="0.4"/>
  <circle cx="32" cy="32" r="8" fill="#F9CF4A"/>
  
  <!-- Pontos de energia -->
  <circle cx="32" cy="20" r="2.5" fill="#7FD36E"/>
  <circle cx="42" cy="26" r="2.5" fill="#7FD36E"/>
  <circle cx="42" cy="38" r="2.5" fill="#7FD36E"/>
  <circle cx="32" cy="44" r="2.5" fill="#7FD36E"/>
  <circle cx="22" cy="38" r="2.5" fill="#7FD36E"/>
  <circle cx="22" cy="26" r="2.5" fill="#7FD36E"/>
  
  <!-- Core pulsante -->
  <circle cx="32" cy="32" r="4" fill="#123D59"/>
  
  <!-- Raios de ativacao -->
  <line x1="32" y1="32" x2="32" y2="20" stroke="#C9F27B" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="42" y2="26" stroke="#C9F27B" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="42" y2="38" stroke="#C9F27B" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="32" y2="44" stroke="#C9F27B" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="22" y2="38" stroke="#C9F27B" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="22" y2="26" stroke="#C9F27B" stroke-width="2" stroke-linecap="round"/>
</svg>
