<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="aguaBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1d5e80"/>
      <stop offset="100%" stop-color="#0a2a3d"/>
    </radialGradient>
    <linearGradient id="tankGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5bc8f5"/>
      <stop offset="100%" stop-color="#2288bb"/>
    </linearGradient>
  </defs>

  <!-- Background base -->
  <rect width="200" height="200" rx="14" fill="url(#aguaBg)"/>
  <rect width="200" height="200" rx="14" fill="none" stroke="#4bb0ff" stroke-width="2.5" opacity="0.7"/>

  <!-- Ground context: Pavement markings -->
  <path d="M40 160h120M60 165h80" stroke="#1e6a90" stroke-width="1" opacity="0.5"/>

  <!-- Ground Pipes (Scenic Detail) -->
  <rect x="30" y="150" width="140" height="6" rx="2" fill="#1e3a50"/>
  <rect x="50" y="145" width="8" height="15" rx="1" fill="#2a4a60"/>
  <rect x="140" y="145" width="8" height="15" rx="1" fill="#2a4a60"/>

  <!-- Valve Box (Scenic Detail) -->
  <rect x="150" y="130" width="20" height="25" rx="2" fill="#1e3a50"/>
  <circle cx="160" cy="138" r="4" fill="#2a8eba" opacity="0.8"/>

  <!-- Water tower: legs -->
  <rect x="78" y="120" width="8" height="55" rx="2" fill="#2a6e96" opacity="0.9"/>
  <rect x="114" y="120" width="8" height="55" rx="2" fill="#2a6e96" opacity="0.9"/>
  <line x1="78" y1="135" x2="122" y2="155" stroke="#2a6e96" stroke-width="3" opacity="0.7"/>
  <line x1="122" y1="135" x2="78" y2="155" stroke="#2a6e96" stroke-width="3" opacity="0.7"/>

  <!-- Water tower: tank body -->
  <ellipse cx="100" cy="98" rx="38" ry="12" fill="#3aa8d8" opacity="0.9"/>
  <rect x="62" y="80" width="76" height="20" rx="4" fill="url(#tankGrad)"/>
  <rect x="62" y="90" width="76" height="10" rx="0" fill="#2288bb" opacity="0.5"/>
  <ellipse cx="100" cy="80" rx="38" ry="12" fill="#5bc8f5"/>
  
  <!-- Leakage/Pressure Signal (Scenic Detail) -->
  <g opacity="0.6">
    <path d="M65 105q-10 10-5 25" stroke="#4bb0ff" stroke-width="1.5" fill="none"/>
    <circle cx="60" cy="132" r="2" fill="#4bb0ff"/>
  </g>

  <!-- Bottom label chip -->
  <rect x="38" y="170" width="124" height="22" rx="5" fill="#0a2230" opacity="0.85"/>
  <text x="100" y="186" font-family="monospace" font-size="10" font-weight="bold" fill="#4bb0ff" text-anchor="middle" letter-spacing="2">ÁGUA</text>
</svg>