<svg width="52" height="60" viewBox="0 0 52 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Obstacle: Bloqueio Sequencia -->
  <!-- Two stacked barriers representing sequential blocking -->
  
  <!-- Top barrier -->
  <rect x="2" y="2" width="48" height="20" rx="3" fill="#d84545" stroke="#f45f5f" stroke-width="2"/>
  <rect x="6" y="6" width="8" height="12" rx="1.5" fill="rgba(255,255,255,0.2)"/>
  <rect x="22" y="6" width="8" height="12" rx="1.5" fill="rgba(255,255,255,0.2)"/>
  <rect x="38" y="6" width="8" height="12" rx="1.5" fill="rgba(255,255,255,0.2)"/>
  
  <!-- Connection line (dashed) -->
  <line x1="26" y1="24" x2="26" y2="36" stroke="#f47575" stroke-width="2" stroke-dasharray="3,3" stroke-linecap="round"/>
  <circle cx="26" cy="30" r="3" fill="#d84545" stroke="#f45f5f" stroke-width="1.5"/>
  
  <!-- Bottom barrier -->
  <rect x="2" y="38" width="48" height="20" rx="3" fill="#d84545" stroke="#f45f5f" stroke-width="2"/>
  <rect x="6" y="42" width="8" height="12" rx="1.5" fill="rgba(255,255,255,0.2)"/>
  <rect x="22" y="42" width="8" height="12" rx="1.5" fill="rgba(255,255,255,0.2)"/>
  <rect x="38" y="42" width="8" height="12" rx="1.5" fill="rgba(255,255,255,0.2)"/>
  
  <!-- Threat indicators -->
  <circle cx="10" cy="12" r="2" fill="#ff6b6b" opacity="0.8"/>
  <circle cx="42" cy="48" r="2" fill="#ff6b6b" opacity="0.8"/>
</svg>
