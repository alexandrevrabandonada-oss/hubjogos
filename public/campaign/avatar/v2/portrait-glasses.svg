<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Avatar V2 - Alexandre Fonseca - Com Óculos -->
  <!-- Baseado em portrait-neutral mas com óculos de armação clara -->
  
  <defs>
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="400" height="400" fill="#f5f5f5" opacity="0"/>
  
  <g filter="url(#shadow)">
    <!-- Pescoço -->
    <rect x="160" y="280" width="80" height="40" fill="#c9a878" rx="8"/>
    
    <!-- Camisa/Camiseta base -->
    <path d="M 130 310 L 140 330 L 260 330 L 270 310 L 240 310 L 240 360 L 160 360 L 160 310 Z" fill="#1a1a1a"/>
    
    <!-- Cabeça -->
    <ellipse cx="200" cy="160" rx="75" ry="95" fill="#d4a882"/>
    
    <!-- Cabelo -->
    <path d="M 130 140 Q 120 120 130 90 Q 150 70 180 65 Q 200 62 220 65 Q 250 70 270 90 Q 280 120 270 140" fill="#1a1a1a"/>
    <path d="M 127 130 L 125 170 Q 128 200 135 210 Q 140 205 142 170 Z" fill="#1a1a1a"/>
    <path d="M 273 130 L 275 170 Q 272 200 265 210 Q 260 205 258 170 Z" fill="#1a1a1a"/>
    
    <!-- Sobrancelhas -->
    <path d="M 150 155 Q 165 148 180 150" stroke="#2a2a2a" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M 220 150 Q 235 148 250 155" stroke="#2a2a2a" stroke-width="5" stroke-linecap="round" fill="none"/>
    
    <!-- Olhos (sem exposição direta pois cobertos por óculos) -->
    <ellipse cx="160" cy="165" rx="12" ry="16" fill="#3d2817"/>
    <ellipse cx="240" cy="165" rx="12" ry="16" fill="#3d2817"/>
    
    <!-- Nariz -->
    <path d="M 200 165 L 200 215" stroke="#8b6f47" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
    <path d="M 195 210 Q 200 218 205 210" stroke="#8b6f47" stroke-width="2.5" opacity="0.6" fill="none" stroke-linecap="round"/>
    
    <!-- Barba -->
    <path d="M 130 230 Q 150 250 175 260 Q 200 265 225 260 Q 250 250 270 230" fill="#4a3728" opacity="0.8"/>
    <ellipse cx="170" cy="245" rx="25" ry="12" fill="#5a4738" opacity="0.4"/>
    <ellipse cx="230" cy="245" rx="25" ry="12" fill="#5a4738" opacity="0.4"/>
    <path d="M 135 260 Q 200 280 265 260" stroke="#a5886d" stroke-width="2" fill="none" opacity="0.5"/>
    
    <!-- Boca - expressão neutra -->
    <path d="M 165 255 Q 200 262 235 255" stroke="#3d2817" stroke-width="3" stroke-linecap="round" fill="none"/>
    
    <!-- Orelhas -->
    <ellipse cx="115" cy="170" rx="18" ry="30" fill="#c9a878"/>
    <ellipse cx="285" cy="170" rx="18" ry="30" fill="#c9a878"/>
    <ellipse cx="118" cy="170" rx="8" ry="15" fill="#a5886d" opacity="0.6"/>
    <ellipse cx="282" cy="170" rx="8" ry="15" fill="#a5886d" opacity="0.6"/>
    
    <!-- Sombras -->
    <ellipse cx="200" cy="210" rx="65" ry="55" fill="#8b6f47" opacity="0.08"/>
    
  </g>
  
  <!-- ÓCULOS - Armação clara (metal/ouro) com lentes -->
  <g id="glasses">
    <!-- Lente esquerda -->
    <rect x="135" y="140" width="50" height="40" rx="6" fill="#e8e8e8" stroke="#d4af37" stroke-width="2.5"/>
    <!-- Reflexo na lente esquerda -->
    <ellipse cx="145" cy="148" rx="12" ry="8" fill="#ffffff" opacity="0.5"/>
    
    <!-- Ponte dos óculos -->
    <line x1="185" y1="160" x2="215" y2="160" stroke="#d4af37" stroke-width="2.5"/>
    
    <!-- Lente direita -->
    <rect x="215" y="140" width="50" height="40" rx="6" fill="#e8e8e8" stroke="#d4af37" stroke-width="2.5"/>
    <!-- Reflexo na lente direita -->
    <ellipse cx="255" cy="148" rx="12" ry="8" fill="#ffffff" opacity="0.5"/>
    
    <!-- Haste esquerda -->
    <path d="M 135 155 Q 120 160 115 175" stroke="#d4af37" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    
    <!-- Haste direita -->
    <path d="M 265 155 Q 280 160 285 175" stroke="#d4af37" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  </g>
  
  <!-- Badge AF -->
  <g id="badge" transform="translate(290, 30)">
    <circle cx="0" cy="0" r="18" fill="#FFB81C"/>
    <circle cx="0" cy="0" r="16" fill="#ffffff"/>
    <text x="-8" y="8" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFB81C" text-anchor="middle">AF</text>
  </g>
  
  <line x1="100" y1="390" x2="300" y2="390" stroke="#FFB81C" stroke-width="2" opacity="0.6"/>
</svg>
