<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Avatar base placeholder técnico estilizado para Alexandre Fonseca -->
  <!-- Versão V1 - placeholder para refinamento profissional futuro -->
  
  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="#FFB81C" opacity="0.1"/>
  
  <!-- Silhueta base de rosto e ombros -->
  <g id="portrait">
    <!-- Pescoço e ombros -->
    <path d="M160 320 L160 280 C160 280 170 260 200 260 C230 260 240 280 240 280 L240 320 L280 360 L120 360 Z" 
          fill="#2D2416" opacity="0.9"/>
    
    <!-- Camisa/roupa -->
    <rect x="120" y="300" width="160" height="100" fill="#1a1508" opacity="0.7"/>
    
    <!-- Cabeça base -->
    <ellipse cx="200" cy="200" rx="80" ry="95" fill="#D4A574"/>
    
    <!-- Cabelo -->
    <path d="M120 170 Q130 140 150 130 Q170 125 200 125 Q230 125 250 130 Q270 140 280 170 L280 190 Q270 160 200 160 Q130 160 120 190 Z" 
          fill="#2D2416"/>
    
    <!-- Orelhas -->
    <ellipse cx="115" cy="200" rx="15" ry="25" fill="#C69563"/>
    <ellipse cx="285" cy="200" rx="15" ry="25" fill="#C69563"/>
    
    <!-- Sobrancelhas -->
    <path d="M155 185 Q170 180 185 182" stroke="#2D2416" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M215 182 Q230 180 245 185" stroke="#2D2416" stroke-width="4" stroke-linecap="round" fill="none"/>
    
    <!-- Olhos -->
    <ellipse cx="170" cy="200" rx="8" ry="12" fill="#2D2416"/>
    <ellipse cx="230" cy="200" rx="8" ry="12" fill="#2D2416"/>
    <circle cx="172" cy="198" r="3" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="232" cy="198" r="3" fill="#FFFFFF" opacity="0.6"/>
    
    <!-- Nariz -->
    <path d="M200 200 L200 230" stroke="#A67C52" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
    <path d="M190 225 Q195 230 200 230 Q205 230 210 225" stroke="#A67C52" stroke-width="2" opacity="0.5" fill="none"/>
    
    <!-- Boca - expressão firme mas acessível -->
    <path d="M175 250 Q200 255 225 250" stroke="#2D2416" stroke-width="3" stroke-linecap="round" fill="none"/>
    
    <!-- Sombreamento facial leve -->
    <ellipse cx="200" cy="220" rx="70" ry="60" fill="#A67C52" opacity="0.1"/>
  </g>
  
  <!-- Badge de identidade (AF) -->
  <g id="identity-badge">
    <circle cx="320" cy="80" r="35" fill="#FFB81C"/>
    <text x="320" y="92" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#1a1508" text-anchor="middle">AF</text>
  </g>
  
  <!-- Marcação de versão -->
  <text x="10" y="390" font-family="monospace" font-size="10" fill="#999" opacity="0.5">v1-placeholder</text>
</svg>
